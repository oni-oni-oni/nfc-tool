<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>道具管理スマホ版</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; padding: 10px; font-family: sans-serif; font-size: 16px; }
    .container-custom { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
    /* ボタンを大きく押しやすく */
    .btn-lg-custom { padding: 15px; font-weight: bold; font-size: 1.1em; width: 100%; border-radius: 10px; margin-bottom: 10px; }
    /* タブの調整 */
    .nav-pills .nav-link { margin-bottom: 5px; background: #e9ecef; color: #495057; border-radius: 8px; }
    .nav-pills .nav-link.active { background-color: #0d6efd !important; }
    /* テーブルのスマホ最適化 */
    .table { font-size: 0.9em; }
    .status-badge { padding: 5px 8px; border-radius: 5px; font-size: 0.8em; }
    .bg-保管中 { background-color: #dee2e6; }
    .bg-貸出中 { background-color: #cfe2ff; color: #084298; }
    .bg-修理中 { background-color: #f8d7da; color: #842029; }
    .view-section { display: none; }
    .active-view { display: block !important; }
  </style>
</head>
<body>

<div class="container-custom">
  <!-- ログイン画面 -->
  <div id="view-login" class="view-section active-view mt-4 text-center">
    <h3 class="fw-bold mb-4">🔑 システムログイン</h3>
    <input type="text" id="userId" class="form-control form-control-lg mb-3" placeholder="ユーザーID">
    <input type="password" id="userPw" class="form-control form-control-lg mb-4" placeholder="パスワード">
    <button id="loginBtn" class="btn btn-primary btn-lg-custom" onclick="handleLogin()">ログイン</button>
    <p id="loginMsg" class="text-danger mt-3"></p>
  </div>

  <!-- メイン画面 -->
  <div id="view-main" class="view-section">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold text-primary mb-0" id="displayCompany"></h5>
      <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()">ログアウト</button>
    </div>

    <!-- スマホ用ナビゲーション -->
    <ul class="nav nav-pills nav-fill mb-3" id="pills-tab">
      <li class="nav-item"><a class="nav-link active" id="tab-tools" onclick="switchView('tools')">稼働状況</a></li>
      <li class="nav-item"><a class="nav-link" id="tab-master" onclick="switchView('master')">道具登録</a></li>
      <li class="nav-item"><a class="nav-link" id="tab-staff" onclick="switchView('staff')">社員設定</a></li>
    </ul>

    <!-- 1. 稼働状況一覧 -->
    <div id="sec-tools" class="sub-view active-view">
      <div id="loading-tools" class="text-center p-3" style="display:none;">読込中...</div>
      <div class="table-responsive">
        <table class="table table-sm table-hover">
          <thead class="table-dark"><tr><th>道具名</th><th>場所</th><th>状況</th></tr></thead>
          <tbody id="tbd"></tbody>
        </table>
      </div>
    </div>

    <!-- 2. 道具登録（スキャン連動版） -->
    <div id="sec-master" class="sub-view" style="display:none;">
      <div class="card card-body mb-3 border-0 bg-light">
        <label class="small fw-bold mb-1">新しい道具の名前</label>
        <input type="text" id="newToolName" class="form-control form-control-lg mb-3" placeholder="例：インパクトドライバ">
        <button class="btn btn-success btn-lg-custom" onclick="scanAndRegisterTool()">📡 スキャンして登録</button>
        <p class="small text-muted mt-2">※ボタンを押してからタグをスマホにかざしてください</p>
      </div>
      <table class="table table-striped mt-3">
        <thead class="table-success"><tr><th>道具名</th><th>タグID</th><th></th></tr></thead>
        <tbody id="masterTableBody"></tbody>
      </table>
    </div>

    <!-- 3. 社員登録 -->
    <div id="sec-staff" class="sub-view" style="display:none;">
      <div class="card card-body mb-3 border-0 bg-light">
        <input type="text" id="deptName" class="form-control mb-2" placeholder="部署名">
        <input type="text" id="staffName" class="form-control mb-3" placeholder="氏名">
        <button class="btn btn-primary btn-lg-custom" onclick="registerStaff()">社員を追加</button>
      </div>
      <table class="table table-sm"><tbody id="staffTbd"></tbody></table>
    </div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbz_aAZvAV3kRKlCrhtczqHj4CbdtKUDykMqN5RxZfk2-CHQ392VYcl7yD9wvtlgykL7YA/exec";
  let session = null;

  async function callGas(data) {
    return fetch(GAS_URL, {
      method: "POST",
      mode: "cors",
      redirect: "follow",
      body: JSON.stringify(data),
      headers: { "Content-Type": "text/plain;charset=utf-8" }
    });
  }

  async function handleLogin() {
    const id = document.getElementById('userId').value;
    const pw = document.getElementById('userPw').value;
    const msg = document.getElementById('loginMsg');
    msg.innerText = "認証中...";
    try {
      const res = await callGas({ action: "login", id: id, pw: pw });
      const data = await res.json();
      if (data.success) {
        session = data;
        document.getElementById('displayCompany').innerText = data.companyCode;
        document.getElementById('view-login').style.display = "none";
        document.getElementById('view-main').classList.add('active-view');
        loadToolsData();
      } else { msg.innerText = data.message; }
    } catch (e) { msg.innerText = "通信エラー"; }
  }

  function switchView(v) {
    ['tools', 'master', 'staff'].forEach(id => {
      document.getElementById('sec-' + id).style.display = (v === id ? 'block' : 'none');
      document.getElementById('tab-' + id).classList.toggle('active', v === id);
    });
    if (v === 'master') loadMasterData();
    if (v === 'staff') loadStaffData();
  }

  async function loadToolsData() {
    document.getElementById('loading-tools').style.display = "block";
    const res = await callGas({ action: "fetchData", sId: session.sId });
    const db = await res.json();
    const rows = db.slice(1);
    document.getElementById('tbd').innerHTML = rows.map(x => `
      <tr>
        <td><strong>${x[1]||""}</strong></td>
        <td><small>${x[2]||""}</small></td>
        <td><span class="status-badge bg-${x[4]||'保管中'}">${x[4]||""}</span></td>
      </tr>`).join('');
    document.getElementById('loading-tools').style.display = "none";
  }

  // ★道具登録（スキャン連携版）
  async function scanAndRegisterTool() {
    const name = document.getElementById('newToolName').value;
    if (!name) return alert("道具名を入力してください");

    try {
      if (!('NDEFReader' in window)) return alert("このブラウザはNFCに対応していません");
      const ndef = new NDEFReader();
      await ndef.scan();
      alert("タグ（タブ）をスマホ背面にかざしてください");

      ndef.onreading = async (event) => {
        const tagId = event.serialNumber;
        const res = await callGas({ action: "addToolMaster", name: name, tag: tagId, sId: session.sId });
        const result = await res.json();
        alert(result.message);
        document.getElementById('newToolName').value = "";
        loadMasterData();
      };
    } catch (e) { alert("NFCエラー: " + e); }
  }

  async function loadMasterData() {
    const res = await callGas({ action: "fetchToolMaster", sId: session.sId });
    const d = await res.json();
    document.getElementById('masterTableBody').innerHTML = (d||[]).map(r => `
      <tr><td>${r[0]}</td><td><small>${r[1]}</small></td><td><button class="btn btn-sm btn-outline-danger" onclick="deleteTool('${r[0]}')">×</button></td></tr>`).join('');
  }

  async function deleteTool(name) {
    if(!confirm(name + " を削除しますか？")) return;
    const res = await callGas({ action: "deleteTool", name: name, sId: session.sId });
    loadMasterData();
  }

  async function loadStaffData() {
    const res = await callGas({ action: "fetchStaff", sId: session.sId });
    const d = await res.json();
    document.getElementById('staffTbd').innerHTML = (d||[]).map(r => `
      <tr class="align-middle"><td>${r[1]}</td><td>${r[2]}</td><td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="delStaff('${r[2]}')">削除</button></td></tr>`).join('');
  }

  async function registerStaff() {
    const d = document.getElementById('deptName').value, n = document.getElementById('staffName').value;
    const res = await callGas({ action: "addStaff", dept: d, name: n, sId: session.sId, companyCode: session.companyCode });
    loadStaffData();
  }
</script>
</body>
</html>
