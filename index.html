<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC高速スキャナー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; padding: 20px; }
        .scan-card { background: #1e1e1e; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .list-group-item { background: #2c2c2c; color: white; border: 1px solid #3d3d3d; }
    </style>
</head>
<body>
    <div class="container scan-card text-center">
        <h3 class="mb-4">📡 高速一括スキャナー</h3>
        
        <button id="btnScan" class="btn btn-success btn-lg w-100 py-4 mb-3" onclick="startNFC()">
            スキャン開始
        </button>
        <p id="status" class="small text-secondary">ボタンを押してタグにかざしてください</p>

        <div class="mt-4 text-start">
            <label class="small fw-bold">スキャン済みリスト (<span id="count">0</span>)</label>
            <ul id="scanList" class="list-group mt-2"></ul>
        </div>

        <button id="btnSubmit" class="btn btn-primary btn-lg w-100 mt-4" style="display:none;" onclick="sendToGas()">
            GASへ一括送信
        </button>
    </div>

    <script>
        let tagIds = [];
        // ★ここにあなたのGASのデプロイURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/XXXXX/exec";

        async function startNFC() {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                document.getElementById('status').innerText = "読み取り待機中... 連続でかざしてください";
                document.getElementById('status').classList.replace('text-secondary', 'text-info');

                ndef.onreading = event => {
                    const id = event.serialNumber;
                    if (!tagIds.includes(id)) {
                        tagIds.push(id);
                        updateList(id);
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                };
            } catch (e) {
                alert("NFCエラー: " + e);
            }
        }

        function updateList(id) {
            const list = document.getElementById('scanList');
            const count = document.getElementById('count');
            const li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between align-items-center";
            li.innerHTML = `<span>${id}</span> <span class="badge bg-primary rounded-pill">New</span>`;
            list.prepend(li); // 新しいものを上に
            count.innerText = tagIds.length;
            document.getElementById('btnSubmit').style.display = "block";
        }

        async function sendToGas() {
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "送信中...";

            // 今回はシンプルにIDリストだけ飛ばす例
            const payload = {
                tagIds: tagIds,
                sId: "あなたのスプレッドシートID", // ここも埋めておくと楽です
                status: "貸出中"
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.text();
                alert("送信完了: " + result);
                tagIds = [];
                location.reload(); // 完了したらリセット
            } catch (e) {
                alert("送信エラー: " + e);
                btn.disabled = false;
                btn.innerText = "再試行";
            }
        }
    </script>
</body>
</html>
