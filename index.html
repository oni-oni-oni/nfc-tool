<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道具管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 80px; }
        .card-custom { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; margin-top: 15px; }
        .nav-fixed { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .view-section { display: none; }
        .active-view { display: block; }
        img.thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; background: #eee; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="view-login" class="view-section active-view mt-5 text-center">
        <div class="card card-custom border-0">
            <h3 class="fw-bold mb-4">🔑 Login</h3>
            <input type="text" id="userId" class="form-control mb-3" placeholder="ユーザーID">
            <input type="password" id="userPw" class="form-control mb-4" placeholder="パスワード">
            <button class="btn btn-primary w-100 py-3" onclick="handleLogin()">ログイン</button>
            <p id="loginMsg" class="text-danger mt-3 small"></p>
        </div>
    </div>

    <div id="view-register" class="view-section">
        <div class="card card-custom border-0 mb-4">
            <h5 class="fw-bold">➕ 道具の登録・編集</h5>
            <div class="row g-2">
                <div class="col-8"><input type="text" id="regName" class="form-control" placeholder="道具名"></div>
                <div class="col-4"><button class="btn btn-secondary w-100" onclick="scanSingleTag()">スキャン</button></div>
            </div>
            <input type="text" id="regTag" class="form-control my-2 bg-light" readonly placeholder="タグID (スキャンしてください)">
            <input type="text" id="regRemarks" class="form-control mb-2" placeholder="備考・メモ">
            <input type="file" id="regImage" class="form-control mb-2" accept="image/*" capture="environment">
            <button class="btn btn-success w-100" id="btnReg" onclick="registerTool()">名簿に保存</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle bg-white rounded shadow-sm">
                <thead class="table-light"><tr><th>写真</th><th>道具名</th><th>タグID</th><th>操作</th></tr></thead>
                <tbody id="toolMasterTbd"></tbody>
            </table>
        </div>
    </div>

    <div id="view-scan" class="view-section">...</div>
    <div id="view-list" class="view-section">...</div>
</div>

<nav class="nav-fixed" id="mainNav" style="display:none;">
    <a href="#" onclick="switchView('scan')">📡</a>
    <a href="#" onclick="switchView('list')">📋</a>
    <a href="#" onclick="switchView('register')">➕</a>
    <a href="#" onclick="location.reload()">🚪</a>
</nav>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxfegh7kmH3W1njOYJ0BSH-Vai0DUdt9pxn1MszcXCgfvfbR_j3TqJD1HC6yhD6PoqHOg/exec";    let session = { sId: "", folderId: "" };
    let toolMap = {};

    async function callGas(p) { return await fetch(GAS_URL, { method: "POST", body: JSON.stringify(p) }); }

    async function handleLogin() {
        const id = document.getElementById('userId').value, pw = document.getElementById('userPw').value;
        const res = await callGas({ action: "login", id, pw });
        const data = await res.json();
        if (data.success) {
            session = data;
            document.getElementById('mainNav').style.display = "flex";
            switchView('register');
        } else { alert("認証失敗"); }
    }

    function switchView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active-view'));
        document.getElementById('view-' + v).classList.add('active-view');
        if (v === 'register') loadToolMaster();
    }

    async function registerTool() {
        const btn = document.getElementById('btnReg');
        btn.disabled = true; btn.innerText = "処理中...";
        
        const imgFile = document.getElementById('regImage').files[0];
        let base64 = "";
        if (imgFile) {
            base64 = await new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(imgFile); });
        }

        try {
            const res = await callGas({
                action: "addToolMaster", sId: session.sId, folderId: session.folderId,
                name: document.getElementById('regName').value, tag: document.getElementById('regTag').value,
                remarks: document.getElementById('regRemarks').value, imageBlob: base64
            });
            const msg = await res.text();
            alert(msg); // ここに「上書き完了！ URL: ...」が表示される
            
            if(msg.includes("完了")) {
                document.getElementById('regName').value = ""; document.getElementById('regTag').value = "";
                document.getElementById('regRemarks').value = ""; document.getElementById('regImage').value = "";
                btn.innerText = "名簿に保存"; btn.className = "btn btn-success w-100";
                loadToolMaster();
            }
        } catch (e) { alert("エラーが発生しました"); }
        btn.disabled = false;
    }

    async function loadToolMaster() {
        const res = await callGas({ action: "fetchToolMaster", sId: session.sId });
        const tools = await res.json();
        document.getElementById('toolMasterTbd').innerHTML = tools.map(t => `
            <tr>
                <td><img src="${t[3] || ''}" class="thumb"></td>
                <td><b>${t[0]}</b></td>
                <td><small class="text-muted">${t[1]}</small></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="editTool('${t[1]}','${t[0]}','${t[4]}')">編集</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteTool('${t[1]}')">削</button>
                </td>
            </tr>
        `).join('');
    }

    function editTool(tag, name, rem) {
        document.getElementById('regTag').value = tag;
        document.getElementById('regName').value = name;
        document.getElementById('regRemarks').value = rem || "";
        document.getElementById('btnReg').innerText = "上書き保存";
        document.getElementById('btnReg').className = "btn btn-warning w-100";
        window.scrollTo(0,0);
    }

    async function scanSingleTag() {
        const ndef = new NDEFReader(); await ndef.scan();
        ndef.onreading = e => { document.getElementById('regTag').value = e.serialNumber; };
    }
</script>
</body>
</html>
