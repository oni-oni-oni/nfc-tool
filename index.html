<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道具管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-bottom: 70px; }
        .screen { display: none; }
        .active { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 100; }
        img.pic { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container py-3" id="main-container">
    <!-- 1. ログイン -->
    <div id="scr-login" class="screen active mt-5 text-center">
        <div class="card p-4 shadow-sm border-0">
            <h4 class="mb-4">System Login</h4>
            <input type="text" id="in-user" class="form-control mb-3" placeholder="ユーザーID">
            <input type="password" id="in-pass" class="form-control mb-4" placeholder="パスワード">
            <button class="btn btn-primary w-100" onclick="performAuth()">ログイン</button>
        </div>
    </div>

    <!-- 2. 一括スキャン -->
    <div id="scr-scan" class="screen mt-3">
        <h5 class="fw-bold mb-3">📡 一括スキャン</h5>
        <button class="btn btn-info w-100 mb-3 py-3 text-white fw-bold" onclick="launchNfcScan()">スキャン開始</button>
        <div id="nfc-log" class="small text-muted mb-2 text-center">待機中...</div>
        <ul id="scan-list" class="list-group shadow-sm"></ul>
    </div>

    <!-- 3. 名簿・登録 -->
    <div id="scr-list" class="screen mt-3">
        <div class="card p-3 mb-4 border-0 shadow-sm">
            <h6 id="form-title" class="fw-bold">➕ 道具の登録</h6>
            <div class="row g-2">
                <div class="col-8"><input type="text" id="tool-name" class="form-control" placeholder="道具名"></div>
                <div class="col-4"><button class="btn btn-secondary w-100" onclick="getSingleNfc()">タグ</button></div>
            </div>
            <input type="text" id="tool-tag" class="form-control my-2 bg-light" readonly placeholder="タグID">
            <input type="file" id="tool-img" class="form-control mb-2" accept="image/*" capture="environment">
            <button class="btn btn-success w-100" id="btn-save" onclick="apiSaveItem()">名簿に保存</button>
        </div>
        <div class="table-responsive">
            <table class="table table-hover bg-white rounded shadow-sm">
                <tbody id="tool-list-body"></tbody>
            </table>
        </div>
    </div>
</div>

<nav class="nav-bar" id="bottom-nav" style="display:none;">
    <a href="javascript:void(0)" onclick="navTo('scan')">📡 スキャン</a>
    <a href="javascript:void(0)" onclick="navTo('list')">📋 名簿</a>
    <a href="javascript:location.reload()">🚪 終了</a>
</nav>

<script>
    // デプロイURLを「新しいデプロイ」のものに更新してください
    const APP_URL = "ここに新しいデプロイURLを貼る";
    let userSession = {};

    async function apiCall(data) {
        return await fetch(APP_URL, { method: "POST", body: JSON.stringify(data) });
    }

    async function performAuth() {
        const id = document.getElementById('in-user').value;
        const pw = document.getElementById('in-pass').value;
        const res = await apiCall({ action: "login", id, pw });
        const data = await res.json();
        if (data.success) {
            userSession = data;
            document.getElementById('bottom-nav').style.display = "flex";
            navTo('list');
        } else { alert("失敗"); }
    }

    function navTo(scr) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + scr).classList.add('active');
        if (scr === 'list') apiFetchItems();
    }

    async function launchNfcScan() {
        if (!('NDEFReader' in window)) return alert("NFC非対応");
        const reader = new NDEFReader(); await reader.scan();
        document.getElementById('nfc-log').innerText = "スキャン中...";
        reader.onreading = e => {
            const li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between";
            li.innerHTML = `<span>ID: ${e.serialNumber}</span><span class="badge bg-success">検知</span>`;
            document.getElementById('scan-list').prepend(li);
        };
    }

    async function apiFetchItems() {
        const res = await apiCall({ action: "fetchItems" });
        const data = await res.json();
        document.getElementById('tool-list-body').innerHTML = data.map(t => `
            <tr>
                <td><img src="${t[2] || ''}" class="pic"></td>
                <td><b>${t[0]}</b><br><small>${t[1]}</small></td>
                <td><button class="btn btn-sm btn-outline-primary" onclick="setEdit('${t[1]}','${t[0]}')">編</button></td>
            </tr>
        `).join('');
    }

    async function apiSaveItem() {
        const file = document.getElementById('tool-img').files[0];
        let base64 = "";
        if (file) base64 = await new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(file); });
        const res = await apiCall({
            action: "saveItem",
            folderId: userSession.folderId,
            name: document.getElementById('tool-name').value,
            tag: document.getElementById('tool-tag').value,
            imageBlob: base64
        });
        alert(await res.text());
        apiFetchItems();
    }

    function setEdit(tag, name) {
        document.getElementById('tool-tag').value = tag;
        document.getElementById('tool-name').value = name;
        window.scrollTo(0,0);
    }

    async function getSingleNfc() {
        const reader = new NDEFReader(); await reader.scan();
        reader.onreading = e => { document.getElementById('tool-tag').value = e.serialNumber; };
    }
</script>
</body>
</html>
