<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>道具管理</title>
  <!-- 外部ファイルを読み込めなくても動くように、ボタンのスタイルを直接記述 -->
  <style>
    body { background-color: #f8f9fa; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
    .view-section { display: none !important; }
    .view-section.active { display: block !important; }
    .container { max-width: 500px; margin: auto; padding: 20px 15px; }
    
    /* ログイン画面 */
    .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 50px; text-align: center; }
    
    /* メインカード */
    .app-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
    
    /* スキャンボタン周り - 外部CSSに依存しないように再設計 */
    .input-group-custom { display: flex; width: 100%; height: 50px; margin-bottom: 20px; }
    .input-custom { flex: 1; border: 1px solid #ced4da; border-radius: 10px 0 0 10px; padding: 10px; font-size: 16px; outline: none; }
    
    /* スキャンボタン（グレー） */
    .btn-scan-action { 
      background-color: #6c757d; 
      color: white; 
      border: none; 
      padding: 0 20px; 
      border-radius: 0 10px 10px 0; 
      cursor: pointer;
      font-weight: bold;
      min-width: 100px;
    }
    .btn-scan-action:active { background-color: #5a6268; }

    /* 登録ボタン（グリーン） */
    .btn-submit { 
      background-color: #198754; 
      color: white; 
      border: none; 
      width: 100%; 
      padding: 15px; 
      border-radius: 15px; 
      font-size: 1.2rem; 
      font-weight: bold; 
      margin-top: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    /* ボトムナビゲーション */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: none; justify-content: space-around; border-top: 1px solid #eee; z-index: 2000; height: 70px; }
    .nav-item { border: none; background: none; color: #999; font-size: 12px; flex: 1; padding: 10px 0; cursor: pointer; }
    .nav-item.active { color: #0d6efd; font-weight: bold; }
    
    .form-label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
    input[type="text"], input[type="password"] { width: 100%; box-sizing: border-box; border: 1px solid #dee2e6; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
  </style>
</head>
<body>

  <!-- 1. ログイン -->
  <div id="view-login" class="view-section active">
    <div class="container">
      <div class="login-card">
        <h2 style="margin-bottom: 30px;">🔑 ログイン</h2>
        <input type="text" id="userId" placeholder="ユーザーID">
        <input type="password" id="userPw" placeholder="パスワード">
        <button class="btn-submit" style="background-color: #0d6efd;" onclick="handleLogin()">ログインする</button>
        <p id="loginMsg" style="color: red; font-size: 12px; margin-top: 10px;"></p>
      </div>
    </div>
  </div>

  <!-- 2. メイン画面 -->
  <div id="view-main" class="view-section">
    <div class="container">
      
      <!-- 登録セクション -->
      <div id="sec-register" class="sub-view">
        <div class="app-card">
          <h3 style="margin-top:0;">道具登録</h3>
          <label class="form-label">道具名</label>
          <input type="text" id="newToolName" placeholder="例：インパクトレンチ">
          
          <label class="form-label">タグID</label>
          <div class="input-group-custom">
            <input type="text" id="tagIdDisplay" class="input-custom" placeholder="スキャンしてください" readonly>
            <button type="button" class="btn-scan-action" onclick="startNFCScan()">スキャン</button>
          </div>
          
          <button class="btn-submit" onclick="finalRegister()">名簿に登録する</button>
        </div>

        <div style="font-weight: bold; color: #666; margin: 20px 0 10px 5px;">登録済み道具</div>
        <div style="background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
          <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
            <thead style="background: #f1f1f1;">
              <tr><th style="padding: 10px; text-align: left;">道具名</th><th style="padding: 10px;">ID</th><th style="padding: 10px;">操作</th></tr>
            </thead>
            <tbody id="masterTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 状況セクション（必要であれば追加） -->
      <div id="sec-list" class="sub-view" style="display:none;">
          <div style="font-weight: bold; margin-bottom:10px;">稼働状況</div>
          <div style="background:white; border-radius:15px; padding:10px;">
              <table style="width:100%;"><tbody id="tbd"></tbody></table>
          </div>
      </div>

    </div>
  </div>

  <!-- ボトムナビ -->
  <nav class="bottom-nav" id="app-nav">
    <button class="nav-item" onclick="switchTab('list', this)">状況一覧</button>
    <button class="nav-item active" onclick="switchTab('register', this)">道具登録</button>
    <button class="nav-item" onclick="location.reload()">終了</button>
  </nav>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbz_aAZvAV3kRKlCrhtczqHj4CbdtKUDykMqN5RxZfk2-CHQ392VYcl7yD9wvtlgykL7YA/exec";
  let session = null;

  async function handleLogin() {
    const id = document.getElementById('userId').value;
    const pw = document.getElementById('userPw').value;
    if(!id || !pw) return;
    document.getElementById('loginMsg').innerText = "接続中...";

    try {
      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ action: "login", id: id, pw: pw }),
        headers: { "Content-Type": "text/plain" }
      });
      const data = await res.json();
      if (data.success) {
        session = data;
        document.getElementById('view-login').classList.remove('active');
        document.getElementById('view-main').classList.add('active');
        document.getElementById('app-nav').style.display = "flex";
        loadMasterData();
      } else {
        document.getElementById('loginMsg').innerText = "IDまたはパスワードが違います";
      }
    } catch (e) {
      document.getElementById('loginMsg').innerText = "サーバーエラーが発生しました";
    }
  }

  function switchTab(target, el) {
    document.querySelectorAll('.sub-view').forEach(s => s.style.display = 'none');
    document.getElementById('sec-' + target).style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    if(target === 'register') loadMasterData();
  }

  // NFCスキャン機能
  async function startNFCScan() {
    try {
      if (typeof NDEFReader === "undefined") {
        alert("NFC非対応ブラウザです。AndroidのChromeで開いてください。");
        return;
      }
      const ndef = new NDEFReader();
      await ndef.scan();
      alert("タグをかざしてください");
      ndef.onreading = event => {
        document.getElementById('tagIdDisplay').value = event.serialNumber;
      };
    } catch (e) {
      alert("スキャン失敗: " + e);
    }
  }

  async function finalRegister() {
    const n = document.getElementById('newToolName').value;
    const t = document.getElementById('tagIdDisplay').value;
    if(!n || !t) { alert("道具名を入力し、タグをスキャンしてください"); return; }
    
    try {
      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ action: "addToolMaster", name: n, tag: t, sId: session.sId }),
        headers: { "Content-Type": "text/plain" }
      });
      const result = await res.json();
      alert(result.message);
      document.getElementById('newToolName').value = "";
      document.getElementById('tagIdDisplay').value = "";
      loadMasterData();
    } catch (e) {
      alert("登録に失敗しました");
    }
  }

  async function loadMasterData() {
    try {
      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ action: "fetchToolMaster", sId: session.sId }),
        headers: { "Content-Type": "text/plain" }
      });
      const d = await res.json();
      const body = document.getElementById('masterTableBody');
      body.innerHTML = (d||[]).map(r => `
        <tr style="border-bottom: 1px solid #eee;">
          <td style="padding: 10px;">${r[0]}</td>
          <td style="padding: 10px; color: #999; font-size: 11px;">${r[1]}</td>
          <td style="padding: 10px; text-align: right;"><button onclick="deleteTool('${r[0]}')" style="color:red; border:none; background:none;">削除</button></td>
        </tr>
      `).join('');
    } catch (e) { console.error("データ取得失敗"); }
  }

  async function deleteTool(name) {
    if(!confirm("削除しますか？")) return;
    await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ action: "deleteTool", name: name, sId: session.sId }),
      headers: { "Content-Type": "text/plain" }
    });
    loadMasterData();
  }
</script>
</body>
</html>
