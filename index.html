<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道具管理システム (NFCスキャナー)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .view { display: none; }
        .active { display: block; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #ddd; }
        img.thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container py-4">
    <!-- 1. ログイン画面 -->
    <div id="view-login" class="view active mt-5">
        <div class="col-md-6 mx-auto card p-4 text-center">
            <h3 class="mb-4 text-primary">道具管理ログイン</h3>
            <input type="text" id="user-id" class="form-control mb-3" placeholder="ユーザーID">
            <input type="password" id="user-pw" class="form-control mb-4" placeholder="パスワード">
            <button class="btn btn-primary w-100 py-2" onclick="login()">ログイン</button>
        </div>
    </div>

    <!-- 2. 道具一覧画面 -->
    <div id="view-list" class="view">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold">📋 道具一覧</h5>
            <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()">ログアウト</button>
        </div>
        <div class="table-responsive">
            <table class="table bg-white rounded shadow-sm">
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>

    <!-- 3. NFC登録・編集画面 -->
    <div id="view-edit" class="view">
        <div class="card p-3">
            <h5 class="fw-bold mb-3">➕ 道具の登録・編集</h5>
            <input type="text" id="edit-name" class="form-control mb-2" placeholder="道具名">
            <div class="input-group mb-2">
                <input type="text" id="edit-tag" class="form-control bg-light" readonly placeholder="タグID (NFCをかざす)">
                <button class="btn btn-secondary" onclick="scanNfc()">スキャン開始</button>
            </div>
            <input type="text" id="edit-rem" class="form-control mb-3" placeholder="備考">
            <input type="file" id="edit-img" class="form-control mb-3" accept="image/*" capture="environment">
            <button class="btn btn-success w-100 py-2" onclick="save()">名簿に保存</button>
        </div>
    </div>
</div>

<!-- 下部ナビゲーション -->
<nav id="nav" class="nav-bar" style="display:none;">
    <a href="javascript:show('list')" class="text-decoration-none">📋 一覧</a>
    <a href="javascript:show('edit')" class="text-decoration-none">➕ 登録</a>
</nav>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbz_aAZvAV3kRKlCrhtczqHj4CbdtKUDykMqN5RxZfk2-CHQ392VYcl7yD9wvtlgykL7YA/exec";
    let session = {};

    // 通信共通関数
    async function call(payload) {
        return await fetch(URL, { method: "POST", body: JSON.stringify(payload) });
    }

    // ログイン処理[cite: 1, 2]
    async function login() {
        const id = document.getElementById('user-id').value;
        const pw = document.getElementById('user-pw').value;
        try {
            const res = await call({ action: "login", id, pw });
            const data = await res.json();
            if (data.success) {
                session = data;
                document.getElementById('nav').style.display = "flex";
                show('list');
            } else { alert("IDまたはパスワードが違います"); }
        } catch (e) { alert("通信エラー: GASの設定（全員に公開）を確認してください"); }
    }

    function show(v) {
        document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        if (v === 'list') load();
    }

    // 道具一覧読み込み[cite: 1, 2]
    async function load() {
        const res = await call({ action: "fetchItems" });
        const data = await res.json();
        document.getElementById('list-body').innerHTML = data.map(t => `
            <tr onclick="setEdit('${t[1]}','${t[0]}','${t[3]}')">
                <td><img src="${t[2] || ''}" class="thumb" onerror="this.src='https://via.placeholder.com/60'"></td>
                <td><b>${t[0]}</b><br><small class="text-muted">${t[1]}</small></td>
            </tr>
        `).join('');
    }

    // 保存処理（写真付き）[cite: 1, 2]
    async function save() {
        const file = document.getElementById('edit-img').files[0];
        let base64 = "";
        if (file) base64 = await new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(file); });
        
        const res = await call({
            action: "saveItem",
            folderId: session.folderId,
            name: document.getElementById('edit-name').value,
            tag: document.getElementById('edit-tag').value,
            remarks: document.getElementById('edit-rem').value,
            imageBlob: base64
        });
        alert(await res.text());
        show('list');
    }

    function setEdit(tag, name, rem) {
        document.getElementById('edit-tag').value = tag;
        document.getElementById('edit-name').value = name;
        document.getElementById('edit-rem').value = rem || "";
        show('edit');
    }

    // NFC読み取り機能
    async function scanNfc() {
        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            alert("NFCスキャンを開始しました。タグをかざしてください。");
            ndef.onreading = e => {
                document.getElementById('edit-tag').value = e.serialNumber;
                alert("タグを認識しました: " + e.serialNumber);
            };
        } catch (e) {
            alert("NFCエラー: HTTPS接続、またはNFC対応端末/ブラウザであることを確認してください。");
        }
    }
</script>
</body>
</html>
