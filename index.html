<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道具管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 80px; }
        .view-section { display: none; }
        .active-view { display: block; }
        .nav-fixed { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        img.thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- ログイン -->
    <div id="view-login" class="view-section active-view mt-5 text-center">
        <div class="card p-4 border-0 shadow-sm">
            <h3>🔑 Login</h3>
            <input type="text" id="userId" class="form-control my-3" placeholder="ユーザーID">
            <input type="password" id="userPw" class="form-control mb-3" placeholder="パスワード">
            <button class="btn btn-primary w-100 py-2" onclick="handleLogin()">ログイン</button>
        </div>
    </div>

    <!-- 一括スキャン -->
    <div id="view-scan" class="view-section mt-4">
        <h5 class="fw-bold">📡 一括スキャン</h5>
        <button class="btn btn-info w-100 my-3 py-3" onclick="startBulkScan()">スキャン開始</button>
        <div id="scanStatus" class="alert alert-secondary text-center small">待機中...</div>
        <ul id="scanResults" class="list-group shadow-sm"></ul>
    </div>

    <!-- 名簿・登録・編集 -->
    <div id="view-register" class="view-section mt-4">
        <div class="card p-3 mb-4 border-0 shadow-sm">
            <h5 id="regTitle">➕ 道具の登録</h5>
            <div class="row g-2">
                <div class="col-8"><input type="text" id="regName" class="form-control" placeholder="道具名"></div>
                <div class="col-4"><button class="btn btn-secondary w-100" onclick="scanSingleTag()">タグ取得</button></div>
            </div>
            <input type="text" id="regTag" class="form-control my-2 bg-light" readonly placeholder="タグID">
            <input type="text" id="regRemarks" class="form-control mb-2" placeholder="備考">
            <input type="file" id="regImage" class="form-control mb-2" accept="image/*" capture="environment">
            <button class="btn btn-success w-100" id="btnReg" onclick="registerTool()">名簿に保存</button>
        </div>
        <div class="table-responsive">
            <table class="table table-hover bg-white rounded shadow-sm">
                <thead><tr><th>写真</th><th>道具名</th><th>操作</th></tr></thead>
                <tbody id="toolTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 設定 -->
    <div id="view-setting" class="view-section mt-4">
        <div class="card p-3 border-0 shadow-sm">
            <h5>⚙ 管理者設定</h5>
            <input type="text" id="newEmpId" class="form-control my-1" placeholder="新ID">
            <input type="text" id="newEmpPw" class="form-control my-1" placeholder="PW">
            <input type="text" id="newEmpSId" class="form-control my-1" placeholder="社員ID">
            <input type="text" id="newEmpFolder" class="form-control my-1" placeholder="DriveフォルダID">
            <button class="btn btn-dark w-100 mt-2" onclick="registerEmployee()">登録</button>
        </div>
    </div>
</div>

<nav class="nav-fixed" id="mainNav" style="display:none;">
    <a href="#" onclick="switchView('scan')">📡</a>
    <a href="#" onclick="switchView('register')">📋</a>
    <a href="#" onclick="switchView('setting')">⚙</a>
    <a href="#" onclick="location.reload()">🚪</a>
</nav>

<script>
    // デプロイ後のURLをここに入れてください
    const GAS_URL = "ここにデプロイ後のウェブアプリURLを貼る";
    let session = {};

    async function callGas(p) { 
        return await fetch(GAS_URL, { method: "POST", body: JSON.stringify(p) }); 
    }

    async function handleLogin() {
        const id = document.getElementById('userId').value, pw = document.getElementById('userPw').value;
        try {
            const res = await callGas({ action: "login", id, pw });
            const data = await res.json();
            if (data.success) {
                session = data;
                document.getElementById('mainNav').style.display = "flex";
                switchView('register');
            } else { alert("認証失敗"); }
        } catch(e) { alert("通信エラー: URLを確認してください"); }
    }

    function switchView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active-view'));
        document.getElementById('view-' + v).classList.add('active-view');
        if (v === 'register') loadTools();
    }

    async function startBulkScan() {
        if (!('NDEFReader' in window)) return alert("NFC非対応ブラウザです");
        const ndef = new NDEFReader(); await ndef.scan();
        ndef.onreading = e => {
            const li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between";
            li.innerHTML = `<span>ID: ${e.serialNumber}</span><span class="badge bg-success">OK</span>`;
            document.getElementById('scanResults').prepend(li);
        };
    }

    async function loadTools() {
        const res = await callGas({ action: "fetchToolMaster" });
        const data = await res.json();
        document.getElementById('toolTableBody').innerHTML = data.map(t => `
            <tr>
                <td><img src="${t[2] || ''}" class="thumb"></td>
                <td><b>${t[0]}</b></td>
                <td><button class="btn btn-sm btn-primary" onclick="editTool('${t[1]}','${t[0]}','${t[3]}')">編</button></td>
            </tr>
        `).join('');
    }

    async function registerTool() {
        const file = document.getElementById('regImage').files[0];
        let base64 = "";
        if (file) base64 = await new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(file); });
        const res = await callGas({
            action: "addToolMaster",
            folderId: session.folderId,
            name: document.getElementById('regName').value,
            tag: document.getElementById('regTag').value,
            remarks: document.getElementById('regRemarks').value,
            imageBlob: base64
        });
        alert(await res.text());
        loadTools();
    }

    function editTool(tag, name, rem) {
        document.getElementById('regTag').value = tag;
        document.getElementById('regName').value = name;
        document.getElementById('regRemarks').value = rem || "";
        window.scrollTo(0,0);
    }

    async function scanSingleTag() {
        const ndef = new NDEFReader(); await ndef.scan();
        ndef.onreading = e => { document.getElementById('regTag').value = e.serialNumber; };
    }

    async function registerEmployee() {
        const res = await callGas({
            action: "registerEmployee",
            newId: document.getElementById('newEmpId').value,
            newPw: document.getElementById('newEmpPw').value,
            newSId: document.getElementById('newEmpSId').value,
            newFolderId: document.getElementById('newEmpFolder').value,
            newCCode: "C001"
        });
        alert(await res.text());
    }
</script>
</body>
</html>
