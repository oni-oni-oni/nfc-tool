<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC高速スキャナー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; padding: 20px; font-family: sans-serif; }
        .scan-card { background: #1e1e1e; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .list-group-item { background: #2c2c2c; color: white; border: 1px solid #3d3d3d; font-family: monospace; }
        .status-msg { min-height: 1.5em; }
        .company-badge { font-size: 0.8rem; background: #333; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container scan-card text-center">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="company-badge text-secondary" id="displayComp">読み込み中...</span>
            <span class="badge bg-outline-secondary border">汎用スキャナー</span>
        </div>
        
        <h3 class="mb-4">📡 高速一括スキャン</h3>
        
        <button id="btnScan" class="btn btn-success btn-lg w-100 py-4 mb-3" onclick="startNFC()">
            スキャン開始
        </button>
        <p id="status" class="small text-secondary status-msg">ボタンを押してタグにかざしてください</p>

        <div class="mt-4 text-start">
            <label class="small fw-bold">スキャン済みタグ (<span id="count">0</span>)</label>
            <ul id="scanList" class="list-group mt-2"></ul>
        </div>

        <div class="row g-2 mt-4" id="actionButtons" style="display:none;">
            <div class="col-6">
                <button class="btn btn-primary btn-lg w-100 py-3" onclick="sendToGas('貸出中')">一括貸出</button>
            </div>
            <div class="col-6">
                <button class="btn btn-outline-light btn-lg w-100 py-3" onclick="sendToGas('保管中')">一括返却</button>
            </div>
        </div>
    </div>

    <script>
        let tagIds = [];
        
        // --- 汎用化の肝：URLパラメータの取得 ---
        const urlParams = new URLSearchParams(window.location.search);
        const SHEET_ID = urlParams.get('sId');      // URLの sId= を読み取る
        const COMPANY_NAME = urlParams.get('comp') || "ゲストユーザー"; 
        
        // あなたの共通GAS URL（これは窓口なので1つで固定）
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxfegh7kmH3W1njOYJ0BSH-Vai0DUdt9pxn1MszcXCgfvfbR_j3TqJD1HC6yhD6PoqHOg/exec";

        // 起動時に会社名を表示
        window.onload = () => {
            document.getElementById('displayComp').innerText = "🏢 " + COMPANY_NAME;
            if (!SHEET_ID) {
                alert("エラー：URLにシートIDが含まれていません。ログイン画面から開き直してください。");
            }
        };

        async function startNFC() {
            try {
                if (!('NDEFReader' in window)) {
                    alert("Android Chromeで開いてください。");
                    return;
                }
                const ndef = new NDEFReader();
                await ndef.scan();
                document.getElementById('status').innerText = "読み取り待機中... 連続スキャンOK";
                document.getElementById('status').style.color = "#0dcaf0";

                ndef.onreading = event => {
                    const id = event.serialNumber;
                    if (!tagIds.includes(id)) {
                        tagIds.push(id);
                        updateList(id);
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                };
            } catch (e) {
                alert("NFCエラー: " + e);
            }
        }

        function updateList(id) {
            const list = document.getElementById('scanList');
            const count = document.getElementById('count');
            const li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between align-items-center";
            li.innerHTML = `<span>${id}</span> <span class="badge bg-success">検知</span>`;
            list.prepend(li);
            count.innerText = tagIds.length;
            document.getElementById('actionButtons').style.display = "flex";
        }

        async function sendToGas(statusType) {
            if (!SHEET_ID) return alert("シートIDが不明です");
            
            const btns = document.querySelectorAll('#actionButtons button');
            btns.forEach(b => b.disabled = true);
            document.getElementById('status').innerText = "送信中...";

            const payload = {
                tagIds: tagIds,
                sId: SHEET_ID,
                status: statusType,
                userName: "スキャナー(" + COMPANY_NAME + ")",
                placeName: "現場"
            };

            try {
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(payload)
                });
                alert("送信完了！スプレッドシートを確認してください。");
                tagIds = [];
                location.reload(); 
            } catch (e) {
                alert("送信失敗: " + e);
                btns.forEach(b => b.disabled = false);
            }
        }
    </script>
</body>
</html>
