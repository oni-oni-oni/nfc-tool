<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>道具管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: sans-serif; padding-bottom: 70px; }
    .container-mobile { max-width: 500px; margin: auto; padding: 15px; }
    
    /* ログイン画面専用 */
    #view-login { min-height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; }

    /* メイン画面のカードUI */
    .view-section { display: none; }
    .active-view { display: block !important; }
    .app-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    
    /* ボトムナビゲーション */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; z-index: 1000; }
    .nav-item { text-align: center; color: #666; text-decoration: none; font-size: 0.75rem; flex: 1; border: none; background: none; }
    .nav-item i { display: block; font-size: 1.5rem; margin-bottom: 2px; }
    .nav-item.active { color: #0d6efd; fw-bold; }

    /* 登録ボタン */
    .btn-register { background-color: #198754; color: white; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; width: 100%; border: none; }
    .btn-scan { background-color: #6c757d; color: white; }
    
    .table-title { font-weight: bold; color: #666; margin-bottom: 10px; padding-left: 5px; }
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; }
  </style>
</head>
<body>

<div class="container-mobile">
  
  <div id="view-login" class="view-section active-view">
    <div class="login-card text-center">
      <h3 class="fw-bold mb-4">🔑 システムログイン</h3>
      <input type="text" id="userId" class="form-control form-control-lg mb-3" placeholder="ユーザーID">
      <input type="password" id="userPw" class="form-control form-control-lg mb-4" placeholder="パスワード">
      <button class="btn btn-primary w-100 p-3 fw-bold" style="border-radius:12px;" onclick="handleLogin()">ログイン</button>
      <p id="loginMsg" class="text-danger mt-3 small"></p>
    </div>
  </div>

  <div id="view-main" class="view-section">
    <h5 class="fw-bold mb-3" id="displayCompany"></h5>

    <div id="sec-register" class="sub-view active-view">
      <div class="app-card">
        <h5 class="fw-bold mb-4"><i class="bi bi-plus-lg me-2"></i>道具管理</h5>
        <div class="mb-3">
          <label class="small fw-bold mb-1">道具名</label>
          <input type="text" id="newToolName" class="form-control form-control-lg" placeholder="例：インパクトレンチ A">
        </div>
        <div class="mb-4">
          <label class="small fw-bold mb-1">タグID</label>
          <div class="input-group">
            <input type="text" id="tagIdDisplay" class="form-control form-control-lg" placeholder="自動入力されます">
            <button class="btn btn-scan px-4" onclick="startNFCScan()">スキャン</button>
          </div>
        </div>
        <button class="btn-register shadow-sm" onclick="finalRegister()">名簿に登録</button>
      </div>

      <div class="table-title">登録済み道具一覧</div>
      <div class="app-card p-0 overflow-hidden">
        <table class="table mb-0">
          <thead class="table-light small">
            <tr><th>道具名</th><th>タグID</th><th class="text-end">操作</th></tr>
          </thead>
          <tbody id="masterTableBody" class="small"></tbody>
        </table>
      </div>
    </div>

    <div id="sec-list" class="sub-view" style="display:none;">
      <div class="table-title">稼働状況</div>
      <div class="app-card p-0 overflow-hidden">
        <table class="table mb-0">
          <thead class="table-dark small"><tr><th>道具名</th><th>場所</th><th>状況</th></tr></thead>
          <tbody id="tbd" class="small"></tbody>
        </table>
      </div>
    </div>

    <div id="sec-staff" class="sub-view" style="display:none;">
      <div class="app-card">
        <h6 class="fw-bold mb-3">社員追加</h6>
        <input type="text" id="deptName" class="form-control mb-2" placeholder="部署名">
        <input type="text" id="staffName" class="form-control mb-3" placeholder="氏名">
        <button class="btn btn-primary w-100" onclick="registerStaff()">追加</button>
      </div>
      <div class="app-card p-0">
        <table class="table mb-0"><tbody id="staffTbd" class="small"></tbody></table>
      </div>
    </div>
  </div>

</div>

<nav class="bottom-nav" id="app-nav" style="display:none;">
  <button class="nav-item" onclick="switchTab('scan')"><i class="bi bi-radar"></i>スキャン</button>
  <button class="nav-item" onclick="switchTab('list')"><i class="bi bi-clipboard-data"></i>一覧</button>
  <button class="nav-item" onclick="switchTab('staff')"><i class="bi bi-person-fill"></i>社員</button>
  <button class="nav-item active" onclick="switchTab('register')"><i class="bi bi-plus-square-fill"></i>登録</button>
  <button class="nav-item" onclick="location.reload()"><i class="bi bi-door-open-fill"></i>終了</button>
</nav>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbz_aAZvAV3kRKlCrhtczqHj4CbdtKUDykMqN5RxZfk2-CHQ392VYcl7yD9wvtlgykL7YA/exec";
  let session = null;

  async function handleLogin() {
    const id = document.getElementById('userId').value;
    const pw = document.getElementById('userPw').value;
    const msg = document.getElementById('loginMsg');
    msg.innerText = "認証中...";
    try {
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "login", id: id, pw: pw }) });
      const data = await res.json();
      if (data.success) {
        session = data;
        document.getElementById('displayCompany').innerText = "🏢 " + data.companyCode;
        document.getElementById('view-login').classList.remove('active-view');
        document.getElementById('view-main').classList.add('active-view');
        document.getElementById('app-nav').style.display = "flex";
        loadMasterData();
      } else { msg.innerText = data.message; }
    } catch (e) { msg.innerText = "通信エラー"; }
  }

  function switchTab(tab) {
    document.querySelectorAll('.sub-view').forEach(v => v.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    
    if(tab === 'register') {
      document.getElementById('sec-register').style.display = 'block';
      loadMasterData();
    } else if(tab === 'list') {
      document.getElementById('sec-list').style.display = 'block';
      loadToolsData();
    } else if(tab === 'staff') {
      document.getElementById('sec-staff').style.display = 'block';
      loadStaffData();
    }
    event.currentTarget.classList.add('active');
  }

  async function startNFCScan() {
    try {
      const ndef = new NDEFReader();
      await ndef.scan();
      alert("タグをかざしてください");
      ndef.onreading = event => {
        document.getElementById('tagIdDisplay').value = event.serialNumber;
      };
    } catch (e) { alert("NFC非対応ブラウザです"); }
  }

  async function finalRegister() {
    const n = document.getElementById('newToolName').value;
    const t = document.getElementById('tagIdDisplay').value;
    if(!n || !t) return alert("道具名とタグIDが必要です");
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "addToolMaster", name: n, tag: t, sId: session.sId }) });
    alert((await res.json()).message);
    loadMasterData();
  }

  async function loadMasterData() {
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "fetchToolMaster", sId: session.sId }) });
    const d = await res.json();
    document.getElementById('masterTableBody').innerHTML = (d||[]).map(r => `
      <tr><td>${r[0]}</td><td>${r[1]}</td><td class="text-end"><button class="btn btn-outline-danger btn-sm" onclick="deleteTool('${r[0]}')">削除</button></td></tr>
    `).join('');
  }

  // 他の通信関数（loadToolsData, loadStaffDataなど）は前回のロジックと同じです
  async function loadToolsData() {
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "fetchData", sId: session.sId }) });
    const d = await res.json();
    document.getElementById('tbd').innerHTML = d.slice(1).map(x => `
      <tr><td>${x[1]}</td><td>${x[2]}</td><td><span class="status-badge bg-info">${x[4]}</span></td></tr>
    `).join('');
  }
</script>
</body>
</html>
